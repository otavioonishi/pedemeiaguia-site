<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<link rel="stylesheet" href="style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1hRrJow0dnPs8mVgVr0bYXGP7D2JwE-8",
  authDomain: "pedemiaguia.firebaseapp.com",
  projectId: "pedemiaguia",
  appId: "1:1032965745106:web:0be2a606ac7c8fa1a8800b"
};

firebase.initializeApp(firebaseConfig);

// 🔒 PROTEÇÃO REAL
firebase.auth().onAuthStateChanged(user => {
  if(!user){
    window.location.href = "login.html";
  }
});
</script>

<style>
body{
  background:#F0F4F8;
  font-family:'Inter',sans-serif;
}

.admin{
  max-width:600px;
  margin:40px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.admin h1{
  text-align:center;
  margin-bottom:20px;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.card{
  background:#E6F7F1;
  padding:15px;
  border-radius:10px;
  width:48%;
  text-align:center;
  font-weight:bold;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#00875A;
  color:#fff;
  cursor:pointer;
  margin-top:10px;
}

.logout{
  background:#c0392b;
  width:100%;
}
</style>
</head>

<body>

<div class="admin">
<h1>📊 Painel Admin</h1>

<div class="stats">
  <div class="card">Total: <span id="total">0</span></div>
  <div class="card">Hoje: <span id="hoje">0</span></div>
</div>

<button onclick="limpar()">🗑 Limpar registros</button>
<button class="logout" onclick="logout()">🚪 Sair</button>
</div>

<script>
// pegar visitas
function gv(){
  return JSON.parse(localStorage.getItem('v')||'[]');
}

// carregar dados
function load(){
  const v=gv();
  const hojeData=new Date().toLocaleDateString('pt-BR');

  document.getElementById('total').innerText=v.length;
  document.getElementById('hoje').innerText=
    v.filter(x=>x.d===hojeData).length;
}

// limpar
function limpar(){
  localStorage.removeItem('v');
  load();
}

// logout REAL
function logout(){
  firebase.auth().signOut().then(() => {
    window.location.href="login.html";
  });
}

load();
</script>

</body>
</html>
