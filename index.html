<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Pé-de-Meia</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#00875A;--y:#F5C400;--b:#1351B4}
body{font-family:'Inter',sans-serif;background:#F8FAF9;color:#222}

/* HEADER */
header{background:var(--g);padding:16px 20px;display:flex;align-items:center;gap:12px}
.li{width:44px;height:44px;background:var(--y);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
header h1{font-family:'Sora';color:#fff;font-size:1.1rem;font-weight:800}
header p{color:rgba(255,255,255,.8);font-size:.75rem}

/* HERO */
.hero{background:linear-gradient(135deg,#00875A,#004d35);padding:40px 20px;text-align:center}
.badge{background:var(--y);padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:700}
.hero h2{color:#fff;font-size:1.7rem;margin:14px 0}
.hero span{color:var(--y)}
.btnH{background:var(--y);padding:12px 28px;border-radius:50px;text-decoration:none;color:#333;font-weight:700}

/* BOX */
.lb{background:#E6F7F1;padding:9px 12px;border-radius:8px;margin-top:10px;font-weight:600;color:var(--g)}
.box{background:#fff;margin:20px;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
</style>
</head>

<body>

<header>
<div class="li">🎓</div>
<div>
<h1>Guia Pé-de-Meia</h1>
<p>Programa MEC / CAIXA</p>
</div>
</header>

<div class="hero">
<div class="badge">📋 Tutorial</div>
<h2>Veja se seu <span>pagamento</span> foi enviado</h2>
<a href="#passo" class="btnH">Ver passo a passo</a>
</div>

<div class="box" id="passo">
<h3>1. Acesse o site oficial</h3>
<p>Entre no site abaixo:</p>
<div class="lb">🔗 consultapemedemeia.mec.gov.br</div>
</div>

<div class="box">
<h3>2. Faça login</h3>
<p>Use seu CPF e senha do Gov.br</p>
</div>

<div class="box">
<h3>3. Veja o status</h3>
<p>Role até o final e confira se está pago</p>
</div>

<script>
function gv(){try{return JSON.parse(localStorage.getItem('v')||'[]')}catch(e){return[]}}
function sv(){
const v=gv(),n=new Date();
v.push({d:n.toLocaleDateString('pt-BR')});
localStorage.setItem('v',JSON.stringify(v));
}
sv();
</script>

</body>
</html>
