<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuiaPédeMeia - Login</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  background: linear-gradient(135deg, #0d47a1, #1976d2);
}

.box{
  background:#fff;
  padding:35px;
  border-radius:16px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
  margin-bottom:5px;
  color:#0d47a1;
  font-size:24px;
}

.subtitle{
  font-size:13px;
  color:#666;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}

input:focus{
  border-color:#1976d2;
}

button{
  width:100%;
  padding:12px;
  background:#1976d2;
  color:#fff;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0d47a1;
}
</style>
</head>

<body>

<div class="box">
  <h1>GuiaPédeMeia</h1>
  <div class="subtitle">Acesse sua conta</div>

  <input type="email" id="user" placeholder="Email">
  <input type="password" id="pass" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyC1hRrJow0dnPs8mVgVr0bYXGP7D2JwE-8",
  authDomain: "pedemiaguia.firebaseapp.com",
  projectId: "pedemiaguia",
  appId: "1:1032965745106:web:0be2a606ac7c8fa1a8800b"
});

function login(){
  const email = document.getElementById("user").value;
  const senha = document.getElementById("pass").value;

  firebase.auth().signInWithEmailAndPassword(email, senha)
    .then((userCredential) => {
      sessionStorage.setItem("usuario", userCredential.user.email);
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert("Erro ao entrar: " + error.message);
      console.log(error.code, error.message);
    });
}
</script>

</body>
</html>
