<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:linear-gradient(135deg,#00875A,#004d35);
}

.login-box{
  background:#fff;
  padding:30px;
  border-radius:14px;
  width:100%;
  max-width:320px;
  text-align:center;
}

.login-box h2{
  margin-bottom:20px;
}

.login-box input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.login-box button{
  width:100%;
  padding:12px;
  background:#00875A;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.error{
  color:red;
  font-size:.8rem;
  margin-top:10px;
  display:none;
}
</style>

</head>
<body>

<div class="login-box">
<h2>🔐 Admin</h2>

<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div class="error" id="erro">Usuário ou senha incorretos</div>
</div>

<script>
const USER="admin";
const PASS="123456"; // MUDA ISSO

function login(){
  const u=document.getElementById('user').value;
  const p=document.getElementById('pass').value;

  if(u===USER && p===PASS){
    localStorage.setItem("auth","true");
    window.location.href="admin.html";
  }else{
    document.getElementById('erro').style.display="block";
  }
}
</script>

</body>
</html>
